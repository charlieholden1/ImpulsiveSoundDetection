services:
  isd-dashboard:
    build: .
    container_name: isd-dashboard
    ports:
      - "3000:3000"    # HTTP (redirects to HTTPS when TLS configured)
      - "3443:3443"    # HTTPS
    volumes:
      - C:/Users/sholo/Downloads/ImpulsiveSoundDetection/ImpulsiveSoundDetection/logs:/data
      - ./certs:/certs:ro
    # ADMIN_PASSWORD_HASH is loaded via env_file (not inline environment) to
    # prevent Docker Compose from corrupting the $2b$... bcrypt hash via
    # $ interpolation, which happens even when using ${VAR} substitution.
    env_file:
      - .env
    environment:
      - ISD_DB_PATH=/data/host.db
      - PORT=3000
      - HTTPS_PORT=3443
      - CERT_PATH=/certs/server.crt
      - KEY_PATH=/certs/server.key
    restart: unless-stopped